name: Claude Orchestrator

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # manual trigger from GitHub Actions UI

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # allows committing state.json back to this repo

    steps:
      - name: Checkout orchestrator repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js (for claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python run.py

      - name: Commit updated state.json
        run: |
          git config user.name "Claude Orchestrator"
          git config user.email "orchestrator@claude-bot.local"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update orchestrator state [skip ci]"
          git push
